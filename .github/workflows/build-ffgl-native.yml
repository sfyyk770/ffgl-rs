name: Build Native C++ FFGL Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Plugin class/file name (max 16 chars, alphanumeric)'
        required: true
        type: string
      cpp_header_b64:
        description: 'Base64 encoded C++ header file (.h)'
        required: true
        type: string
      cpp_source_b64:
        description: 'Base64 encoded C++ source file (.cpp)'
        required: true
        type: string
      build_id:
        description: 'Build ID for tracking'
        required: false
        type: string
        default: ''

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout FFGL SDK
        uses: actions/checkout@v4
        with:
          repository: resolume/ffgl
          path: ffgl-sdk

      - name: Decode source files
        run: |
          mkdir -p src
          echo "${{ inputs.cpp_header_b64 }}" | base64 -d > src/${{ inputs.plugin_name }}.h
          echo "${{ inputs.cpp_source_b64 }}" | base64 -d > src/${{ inputs.plugin_name }}.cpp
          echo "C++ header and source decoded successfully."

      - name: Build macOS bundle
        run: |
          PLUGIN_NAME="${{ inputs.plugin_name }}"
          CONTENTS_DIR="dist/${PLUGIN_NAME}.bundle/Contents"
          BINARY_DIR="$CONTENTS_DIR/MacOS"
          mkdir -p "$BINARY_DIR"

          # Write Info.plist
          PLUGIN_NAME_LOWER=$(echo "${PLUGIN_NAME}" | tr '[:upper:]' '[:lower:]')
          printf '<?xml version="1.0" encoding="UTF-8"?>\n' > "$CONTENTS_DIR/Info.plist"
          printf '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n' >> "$CONTENTS_DIR/Info.plist"
          printf '<plist version="1.0">\n<dict>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundleDevelopmentRegion</key>\n\t<string>English</string>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundleExecutable</key>\n\t<string>%s</string>\n' "$PLUGIN_NAME" >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundleIdentifier</key>\n\t<string>com.resplug.%s</string>\n' "$PLUGIN_NAME_LOWER" >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundleInfoDictionaryVersion</key>\n\t<string>6.0</string>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundlePackageType</key>\n\t<string>BNDL</string>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundleSignature</key>\n\t<string>????</string>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CFBundleVersion</key>\n\t<string>1.0</string>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '\t<key>CSResourcesFileMapped</key>\n\t<string>yes</string>\n' >> "$CONTENTS_DIR/Info.plist"
          printf '</dict>\n</plist>\n' >> "$CONTENTS_DIR/Info.plist"

          # Compile
          clang++ -O3 -std=c++11 -dynamiclib -undefined dynamic_lookup \
            -arch arm64 -arch x86_64 \
            -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk \
            -I"ffgl-sdk/source/lib" \
            -framework OpenGL -framework Carbon -framework AppKit \
            -DGL_SILENCE_DEPRECATION \
            "ffgl-sdk/source/lib/FFGLSDK.cpp" "src/${PLUGIN_NAME}.cpp" \
            -o "$BINARY_DIR/${PLUGIN_NAME}"

          # Codesign
          codesign --force --sign - "$BINARY_DIR/${PLUGIN_NAME}"
          echo "macOS bundle compiled and signed successfully."

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plugin_name }}-macos-bundle
          path: dist/
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout FFGL SDK
        uses: actions/checkout@v4
        with:
          repository: resolume/ffgl
          path: ffgl-sdk

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Decode source files
        shell: bash
        run: |
          mkdir -p src
          echo "${{ inputs.cpp_header_b64 }}" | base64 -d > src/${{ inputs.plugin_name }}.h
          echo "${{ inputs.cpp_source_b64 }}" | base64 -d > src/${{ inputs.plugin_name }}.cpp
          echo "C++ header and source decoded successfully."

      - name: Build Windows DLL
        shell: cmd
        run: |
          mkdir dist
          cl.exe /O2 /EHsc /LD /std:c++14 ^
            -DWIN32 -D_WINDOWS -DGLEW_STATIC ^
            /I"ffgl-sdk/source/lib" ^
            /I"ffgl-sdk/deps/glew-2.1.0/include" ^
            ffgl-sdk/source/lib/FFGLSDK.cpp src/${{ inputs.plugin_name }}.cpp ^
            ffgl-sdk/deps/glew-2.1.0/lib/Release/x64/glew32s.lib ^
            opengl32.lib user32.lib gdi32.lib shell32.lib ^
            /Fe:dist/${{ inputs.plugin_name }}.dll
          echo "Windows DLL compiled successfully."

      - name: Upload Windows DLL
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plugin_name }}-windows-dll
          path: dist/
          retention-days: 1

  package-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plugin_name }}-macos-bundle
          path: dist

      - name: Download Windows DLL
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plugin_name }}-windows-dll
          path: dist

      - name: Verify package contents
        run: |
          echo "Verifying package artifacts..."
          ls -R dist/

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plugin_name }}-plugin-bundle
          path: dist/
          retention-days: 7
