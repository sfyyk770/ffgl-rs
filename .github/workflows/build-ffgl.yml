name: Build FFGL Plugin

on:
  workflow_dispatch:
    inputs:
      isf_name:
        description: 'Plugin name (max 16 chars, alphanumeric + underscore)'
        required: true
        type: string
      isf_source_b64:
        description: 'ISF shader source code (base64 encoded)'
        required: true
        type: string
      build_id:
        description: 'Build ID for tracking (passed back in artifacts)'
        required: false
        type: string
        default: ''

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout ffgl-rs
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Decode ISF source
        run: |
          echo "${{ inputs.isf_source_b64 }}" | base64 -d > shader.isf
          echo "ISF source written to shader.isf"

      - name: Patch ffgl-rs for UI improvements
        shell: python
        run: |
          import os
          handler_path = "ffgl-isf/src/handler.rs"
          if os.path.exists(handler_path):
              with open(handler_path, "r", encoding="utf-8") as f:
                  content = f.read()
              content = content.replace('format!("*{}", ISF_NAME)', 'format!("{}", ISF_NAME)')
              with open(handler_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Patched handler.rs")

          param_path = "ffgl-isf/src/param.rs"
          if os.path.exists(param_path):
              with open(param_path, "r", encoding="utf-8") as f:
                  content = f.read()
              content = content.replace("group: Some(name.clone())", "group: None")
              target_let = 'let name = CString::new(name.clone()).expect("Failed to create CString");'
              replacement_let = (
                  'let dname = name.clone().replace("_", " ");\n'
                  '            let dname = dname.split_whitespace().map(|s| {\n'
                  '                let mut c = s.chars();\n'
                  '                match c.next() {\n'
                  '                    None => String::new(),\n'
                  '                    Some(f) => f.to_uppercase().collect::<String>() + c.as_str(),\n'
                  '                }\n'
                  '            }).collect::<Vec<_>>().join(" ");\n'
                  '            let name = CString::new(name.clone()).expect("Failed to create CString");'
              )
              content = content.replace(target_let, replacement_let)
              content = content.replace("                    name,", "                    name, display_name: Some(dname.clone()),")
              with open(param_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Patched param.rs")

      - name: Build FFGL Plugin
        env:
          ISF_SOURCE: ${{ github.workspace }}/shader.isf
          ISF_NAME: ${{ inputs.isf_name }}
        run: |
          echo "Building plugin: $ISF_NAME"
          cargo build --release -p ffgl-isf 2>&1

      - name: Package macOS bundle
        run: |
          PLUGIN_NAME="${{ inputs.isf_name }}"
          CONTENTS_DIR="dist/${PLUGIN_NAME}.bundle/Contents"
          BUNDLE_DIR="$CONTENTS_DIR/MacOS"
          mkdir -p "$BUNDLE_DIR"
          cp target/release/libffgl_isf.dylib "$BUNDLE_DIR/$PLUGIN_NAME"
          
          # Create Info.plist to conform to macOS bundle specifications
          cat > "$CONTENTS_DIR/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>CFBundleDevelopmentRegion</key>
          	<string>English</string>
          	<key>CFBundleExecutable</key>
          	<string>${PLUGIN_NAME}</string>
          	<key>CFBundleIdentifier</key>
          	<string>com.ffgl-rs.${PLUGIN_NAME}</string>
          	<key>CFBundleInfoDictionaryVersion</key>
          	<string>6.0</string>
          	<key>CFBundleName</key>
          	<string>${PLUGIN_NAME}</string>
          	<key>CFBundlePackageType</key>
          	<string>BNDL</string>
          	<key>CFBundleSignature</key>
          	<string>????</string>
          	<key>CFBundleVersion</key>
          	<string>1.0</string>
          	<key>CFBundleShortVersionString</key>
          	<string>1.0</string>
          </dict>
          </plist>
          EOF
          
          echo "Bundle created: dist/${PLUGIN_NAME}.bundle"
          ls -la "$BUNDLE_DIR/"

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.isf_name }}-macos-bundle
          path: dist/
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout ffgl-rs
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Decode ISF source
        shell: bash
        run: |
          echo "${{ inputs.isf_source_b64 }}" | base64 -d > shader.isf
          echo "ISF source written to shader.isf"

      - name: Patch ffgl-rs for UI improvements
        shell: python
        run: |
          import os
          handler_path = "ffgl-isf/src/handler.rs"
          if os.path.exists(handler_path):
              with open(handler_path, "r", encoding="utf-8") as f:
                  content = f.read()
              content = content.replace('format!("*{}", ISF_NAME)', 'format!("{}", ISF_NAME)')
              with open(handler_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Patched handler.rs")

          param_path = "ffgl-isf/src/param.rs"
          if os.path.exists(param_path):
              with open(param_path, "r", encoding="utf-8") as f:
                  content = f.read()
              content = content.replace("group: Some(name.clone())", "group: None")
              target_let = 'let name = CString::new(name.clone()).expect("Failed to create CString");'
              replacement_let = (
                  'let dname = name.clone().replace("_", " ");\n'
                  '            let dname = dname.split_whitespace().map(|s| {\n'
                  '                let mut c = s.chars();\n'
                  '                match c.next() {\n'
                  '                    None => String::new(),\n'
                  '                    Some(f) => f.to_uppercase().collect::<String>() + c.as_str(),\n'
                  '                }\n'
                  '            }).collect::<Vec<_>>().join(" ");\n'
                  '            let name = CString::new(name.clone()).expect("Failed to create CString");'
              )
              content = content.replace(target_let, replacement_let)
              content = content.replace("                    name,", "                    name, display_name: Some(dname.clone()),")
              with open(param_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Patched param.rs")

      - name: Build FFGL Plugin
        shell: bash
        env:
          ISF_SOURCE: ${{ github.workspace }}/shader.isf
          ISF_NAME: ${{ inputs.isf_name }}
        run: |
          echo "Building plugin: $ISF_NAME"
          cargo build --release -p ffgl-isf 2>&1

      - name: Package Windows DLL
        shell: bash
        run: |
          PLUGIN_NAME="${{ inputs.isf_name }}"
          mkdir -p dist
          cp target/release/ffgl_isf.dll dist/$PLUGIN_NAME.dll
          echo "Windows DLL created: dist/$PLUGIN_NAME.dll"
          ls -la dist/

      - name: Upload Windows DLL
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.isf_name }}-windows-dll
          path: dist/
          retention-days: 1

  package-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.isf_name }}-macos-bundle
          path: dist

      - name: Download Windows DLL
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.isf_name }}-windows-dll
          path: dist

      - name: Verify release package contents
        run: |
          echo "Combined dist contents:"
          ls -R dist/

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.isf_name }}-plugin-bundle
          path: dist/
          retention-days: 7
